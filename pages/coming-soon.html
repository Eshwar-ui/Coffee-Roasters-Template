<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon | Espresso Elite</title>
    <meta name="description" content="Something new is brewing at Espresso Elite. Sign up to be the first to know about our latest launches.">
    <meta property="og:title" content="Coming Soon | Espresso Elite">
    <meta property="og:description" content="Something new is brewing at Espresso Elite. Sign up to be the first to know about our latest launches.">
    <meta property="og:type" content="website">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/dark-mode.css">
    <link rel="stylesheet" href="../assets/css/rtl.css">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { primary: '#6F4E37', secondary: '#C4A484', accent: '#D4A373', background: '#F5F3EF', dark: '#1C1C1C' },
                    fontFamily: { heading: ['Playfair Display', 'serif'], body: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Organization",
  "name": "Espresso Elite",
  "url": "https://www.espressoelite.com",
  "logo": "https://www.espressoelite.com/assets/images/ui/logo.webp",
  "contactPoint": {
    "@type": "ContactPoint",
    "telephone": "+1-555-019-8472",
    "contactType": "customer service"
  }
}
</script>
</head>
<body class="antialiased bg-[#1C1C1C] text-white transition-colors duration-300 min-h-screen flex flex-col relative overflow-hidden">
    <!-- Global Navigation (injected by components.js) -->
    <div id="global-nav"></div>

    <!-- Background Elements -->
    <img src="../assets/images/hero/hero-1.png" class="absolute inset-0 w-full h-full object-cover opacity-20 filter grayscale blur-[2px]" alt="Background Setup">
    <div class="absolute inset-0 bg-gradient-to-t from-black via-transparent to-black opacity-80 z-0"></div>

    <main class="relative z-10 m-auto max-w-3xl px-6 py-12 text-center w-full bg-black/40 backdrop-blur-md rounded-3xl border border-white/10 shadow-2xl">
        
        <div class="mb-10 inline-block p-4 rounded-full bg-white/10" data-aos="zoom-in">
            <i data-lucide="coffee" class="w-12 h-12 text-primary"></i>
        </div>

        <h1 class="text-4xl md:text-6xl font-heading font-bold mb-4" data-aos="fade-up" data-aos-delay="100">Something Special is Brewing.</h1>
        <p class="text-gray-300 mb-10 text-lg sm:text-xl max-w-xl mx-auto" data-aos="fade-up" data-aos-delay="200">
            We're putting the finishing touches on our newest collection of ethically sourced, precision roasted coffees. Be the first to know when we launch.
        </p>

        <!-- Newsletter Signup -->
        <form class="max-w-md mx-auto flex gap-2 w-full mb-8 relative" data-aos="fade-up" data-aos-delay="300">
            <i data-lucide="mail" class="absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-500 w-5 h-5"></i>
            <input type="email" placeholder="Enter your email address" required class="flex-1 bg-white/10 border border-white/20 text-white rounded-full pl-12 pr-4 py-4 text-sm focus:outline-none focus:border-primary focus:bg-white/20 transition-all placeholder-gray-400">
            <button type="submit" class="bg-primary hover:bg-white hover:text-black font-bold text-white px-6 py-4 rounded-full transition-colors flex items-center justify-center min-w-[120px] shadow-lg">
                Notify Me
            </button>
        </form>

        <!-- Social Links -->
        <div class="flex items-center justify-center gap-6 border-t border-white/10 pt-8 mt-12 w-3/4 mx-auto" data-aos="fade-up" data-aos-delay="400">
            <a href="#" class="text-gray-400 hover:text-white transition-colors"><i data-lucide="instagram" class="w-6 h-6"></i></a>
            <a href="#" class="text-gray-400 hover:text-white transition-colors"><i data-lucide="twitter" class="w-6 h-6"></i></a>
            <a href="#" class="text-gray-400 hover:text-white transition-colors"><i data-lucide="facebook" class="w-6 h-6"></i></a>
        </div>

    </main>

    <!-- Global Footer -->
    <div id="global-footer"></div>

    <!-- Init scripts -->
        <!-- Component Injection -->
    <script src="../assets/js/components.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        // Inject components AFTER lucide is loaded so icons render
        renderNavbar('../');
        renderFooter('../');
    </script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="../assets/js/main.js"></script>
</body>
</html>
