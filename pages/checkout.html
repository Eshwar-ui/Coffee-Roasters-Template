<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | Espresso Elite</title>
    <meta name="description" content="Complete your order of premium coffee capsules and beans. Secure checkout with multiple payment options.">
    <meta property="og:title" content="Checkout | Espresso Elite">
    <meta property="og:description" content="Complete your order of premium coffee capsules and beans.">
    <meta property="og:type" content="website">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/dark-mode.css">
    <link rel="stylesheet" href="../assets/css/rtl.css">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { primary: '#6F4E37', secondary: '#C4A484', accent: '#D4A373', background: '#F5F3EF', dark: '#1C1C1C' },
                    fontFamily: { heading: ['Playfair Display', 'serif'], body: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Organization",
  "name": "Espresso Elite",
  "url": "https://www.espressoelite.com",
  "logo": "https://www.espressoelite.com/assets/images/ui/logo.webp",
  "contactPoint": {
    "@type": "ContactPoint",
    "telephone": "+1-555-019-8472",
    "contactType": "customer service"
  }
}
</script>
</head>
<body class="antialiased bg-[#F5F3EF] dark:bg-dark text-gray-900 dark:text-gray-100 transition-colors duration-300">

    <!-- Minimal Checkout Navbar -->
<!-- Navigation -->
    <script src="../assets/js/navbar.js"></script>

    <!-- Checkout Split Layout -->
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
        <div class="flex flex-col-reverse lg:flex-row gap-16">
            
            <!-- Left side: Form -->
            <div class="flex-1 w-full max-w-2xl mx-auto lg:mx-0">
                    <nav class="text-sm font-medium text-gray-400 mb-8 flex items-center gap-2">
                        <a href="cart.html" class="hover:text-primary transition-colors">Cart</a>
                        <i data-lucide="chevron-right" class="w-3 h-3"></i>
                        <span class="text-gray-900 dark:text-white">Checkout</span>
                    </nav>

                <h2 class="text-2xl font-bold mb-6">Contact</h2>
                <div class="mb-8">
                    <input type="email" placeholder="Email or mobile phone number" class="w-full border border-gray-300 dark:border-gray-700 bg-white dark:bg-[#2A2A2A] rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all">
                    <label class="flex items-center gap-2 mt-4 cursor-pointer">
                        <input type="checkbox" class="accent-primary w-4 h-4 rounded">
                        <span class="text-sm text-gray-600 dark:text-gray-400">Email me with news and offers</span>
                    </label>
                </div>

                <h2 class="text-2xl font-bold mb-6">Shipping address</h2>
                <div class="space-y-4 mb-8">
                    <select class="w-full border border-gray-300 dark:border-gray-700 bg-white dark:bg-[#2A2A2A] rounded-xl px-4 py-3 text-sm appearance-none focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all">
                        <option>United States</option>
                        <option>Canada</option>
                        <option>United Kingdom</option>
                        <option>Australia</option>
                    </select>

                    <div class="grid grid-cols-2 gap-4">
                        <input type="text" placeholder="First name" class="w-full border border-gray-300 dark:border-gray-700 bg-white dark:bg-[#2A2A2A] rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all">
                        <input type="text" placeholder="Last name" class="w-full border border-gray-300 dark:border-gray-700 bg-white dark:bg-[#2A2A2A] rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all">
                    </div>

                    <input type="text" placeholder="Address" class="w-full border border-gray-300 dark:border-gray-700 bg-white dark:bg-[#2A2A2A] rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all">
                    <input type="text" placeholder="Apartment, suite, etc. (optional)" class="w-full border border-gray-300 dark:border-gray-700 bg-white dark:bg-[#2A2A2A] rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all">

                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <input type="text" placeholder="City" class="w-full border border-gray-300 dark:border-gray-700 bg-white dark:bg-[#2A2A2A] rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all md:col-span-1">
                        <select class="w-full border border-gray-300 dark:border-gray-700 bg-white dark:bg-[#2A2A2A] rounded-xl px-4 py-3 text-sm appearance-none focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all">
                            <option>State</option>
                            <option>California</option>
                            <option>New York</option>
                            <option>Texas</option>
                        </select>
                        <input type="text" placeholder="ZIP code" class="w-full border border-gray-300 dark:border-gray-700 bg-white dark:bg-[#2A2A2A] rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all">
                    </div>

                <h2 class="text-2xl font-bold mb-6 mt-12">Payment integration</h2>
                <div class="space-y-4 mb-8">
                    <label class="flex items-center justify-between p-4 border-2 border-primary rounded-xl bg-primary/5 cursor-pointer">
                        <div class="flex items-center gap-3">
                            <input type="radio" name="payment_method" class="accent-primary w-4 h-4" checked>
                            <span class="font-medium">Credit Card</span>
                        </div>
                        <i data-lucide="credit-card" class="text-primary w-5 h-5"></i>
                    </label>

                    <div class="p-6 border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-[#1C1C1C] rounded-xl space-y-4">
                        <input type="text" placeholder="Card number" class="w-full border border-gray-300 dark:border-gray-700 bg-white dark:bg-[#2A2A2A] rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all">
                        <div class="grid grid-cols-2 gap-4">
                            <input type="text" placeholder="Expiration date (MM / YY)" class="w-full border border-gray-300 dark:border-gray-700 bg-white dark:bg-[#2A2A2A] rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all">
                            <input type="text" placeholder="Security code" class="w-full border border-gray-300 dark:border-gray-700 bg-white dark:bg-[#2A2A2A] rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all">
                        </div>
                        <input type="text" placeholder="Name on card" class="w-full border border-gray-300 dark:border-gray-700 bg-white dark:bg-[#2A2A2A] rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all">
                    </div>

                    <label class="flex items-center justify-between p-4 border border-gray-200 dark:border-gray-700 rounded-xl bg-white dark:bg-[#2A2A2A] hover:border-primary transition-colors cursor-pointer">
                        <div class="flex items-center gap-3">
                            <input type="radio" name="payment_method" class="accent-primary w-4 h-4">
                            <span class="font-medium">PayPal</span>
                        </div>
                        <img src="https://upload.wikimedia.org/wikipedia/commons/b/b5/PayPal.svg" class="h-4 object-contain" alt="PayPal">
                    </label>
                </div>

                <div class="flex items-center justify-between">
                    <a href="cart.html" class="text-sm text-primary hover:text-gray-900 dark:hover:text-white transition-colors flex items-center gap-2"><i data-lucide="chevron-left" class="w-4 h-4"></i> Return to cart</a>
                    <button class="bg-primary text-white font-bold py-4 px-8 rounded-xl shadow-lg hover:bg-gray-900 transition-colors flex items-center gap-2"><i data-lucide="lock" class="w-4 h-4"></i> Pay Now</button>
                </div>
            </div>

            <!-- Right side: Order Summary Panel -->
            <div class="w-full lg:w-[450px]">
                <div class="bg-white dark:bg-[#2A2A2A] rounded-3xl p-8 border border-gray-100 dark:border-gray-800 shadow-sm sticky top-24">
                    
                    <div class="space-y-6 mb-6">
                        <!-- Summary Item -->
                        <div class="flex items-center gap-4">
                            <div class="relative w-16 h-16 bg-gray-100 dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 flex-shrink-0">
                                <span class="absolute -top-2 -right-2 bg-gray-500 text-white w-5 h-5 flex items-center justify-center rounded-full text-xs font-bold z-10">1</span>
                                <img src="../assets/images/coffee/capsule.webp" class="w-full h-full object-cover rounded-xl" alt="Product" loading="lazy">
                            </div>
                            <div class="flex-1">
                                <h4 class="font-bold text-sm">Midnight Intenso Pods</h4>
                                <p class="text-xs text-gray-500">20 count</p>
                            </div>
                            <span class="font-bold text-sm">$18.00</span>
                        </div>

                        <!-- Summary Item -->
                        <div class="flex items-center gap-4">
                            <div class="relative w-16 h-16 bg-gray-100 dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 flex-shrink-0">
                                <span class="absolute -top-2 -right-2 bg-gray-500 text-white w-5 h-5 flex items-center justify-center rounded-full text-xs font-bold z-10">2</span>
                                <img src="../assets/images/coffee/beans.webp" class="w-full h-full object-cover rounded-xl" alt="Product" loading="lazy">
                            </div>
                            <div class="flex-1">
                                <h4 class="font-bold text-sm">Yirgacheffe Reserve</h4>
                                <p class="text-xs text-gray-500">Whole Bean</p>
                            </div>
                            <div class="text-right">
                                <p class="font-bold text-sm">$37.40</p>
                                <p class="text-[10px] text-green-500 line-through">$44.00</p>
                            </div>
                        </div>
                    </div>

                    <!-- Discount code -->
                    <div class="flex gap-2 mb-8 border-y border-gray-100 dark:border-gray-800 py-6">
                        <input type="text" placeholder="Discount code" class="flex-1 border border-gray-300 dark:border-gray-700 bg-[#F5F3EF] dark:bg-[#1C1C1C] rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-primary transition-colors">
                        <button class="bg-gray-200 dark:bg-gray-700 text-gray-900 dark:text-gray-100 font-bold px-6 py-3 rounded-xl hover:bg-gray-300 dark:hover:bg-gray-600 transition-colors">Apply</button>
                    </div>

                    <!-- Totals -->
                    <div class="space-y-3 text-sm text-gray-600 dark:text-gray-400 mb-6">
                        <div class="flex justify-between w-full">
                            <span>Subtotal</span> <span class="font-bold text-gray-900 dark:text-white">$55.40</span>
                        </div>
                        <div class="flex justify-between w-full">
                            <span>Shipping</span> <span class="text-gray-900 dark:text-gray-500">Calculated at next step</span>
                        </div>
                    </div>

                    <div class="flex justify-between w-full items-center border-t border-gray-100 dark:border-gray-800 pt-6">
                        <span class="text-base font-bold text-gray-900 dark:text-white">Total</span> 
                        <span class="text-2xl font-bold text-primary">
                            <span class="text-xs text-gray-400 font-normal mr-1">USD</span>$55.40
                        </span>
                    </div>

                </div>
            </div>

        </div>
    </div>

    <!-- Script to Init Base Needs -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="../assets/js/main.js"></script>
</body>
</html>
