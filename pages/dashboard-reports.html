<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espresso Elite Admin | Tactical Reports</title>
    <link rel="icon" type="image/png" href="../assets/images/ui/favicon.png">
    <meta name="robots" content="noindex, nofollow">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/dark-mode.css">
    <link rel="stylesheet" href="../assets/css/rtl.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { primary: '#6F4E37', secondary: '#C4A484', accent: '#D4A373', background: '#F5F3EF', dark: '#121212' },
                    fontFamily: { heading: ['Playfair Display', 'serif'], body: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
</head>
<body class="antialiased bg-gray-50 dark:bg-dark text-gray-900 dark:text-gray-100 transition-colors duration-300">

    <div class="flex h-screen overflow-hidden">
        
        <!-- SIDEBAR -->
        <aside class="w-72 bg-white/70 dark:bg-[#1C1C1C]/70 backdrop-blur-xl border-r border-gray-100 dark:border-gray-800 flex-shrink-0 flex flex-col transition-transform duration-300 md:translate-x-0 -translate-x-full fixed md:relative h-full z-50 md:z-auto" id="sidebar">
            <div class="h-20 flex items-center px-8 border-b border-gray-100 dark:border-gray-800">
                <a href="../index.html" class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-primary/10 rounded-xl flex items-center justify-center text-primary"><i data-lucide="coffee" class="w-5 h-5"></i></div>
                    <div class="rtl:text-right">
                        <span class="font-heading font-bold text-lg block leading-none">Console</span>
                        <span class="text-[9px] font-bold text-gray-400 uppercase tracking-widest">Admin V3</span>
                    </div>
                </a>
                <button class="md:hidden text-gray-400 absolute inset-e-6 top-8" id="close-sidebar"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>
            <div class="flex-1 overflow-y-auto px-6 py-8">
                <nav class="flex flex-col gap-2 sidebar-nav">
                    <p class="text-[10px] font-bold text-gray-400 uppercase tracking-[0.3em] mb-4 px-4 font-heading">Operations Hub</p>
                    <a href="dashboard-admin.html" class="tab-link flex items-center gap-4 px-4 py-4 rounded-2xl text-gray-500 hover:bg-gray-100 dark:text-gray-400 dark:hover:bg-white/5 transition-all font-medium group">
                        <i data-lucide="layout-dashboard" class="w-5 h-5"></i> Dashboard
                    </a>
                    <a href="dashboard-inventory.html" class="tab-link flex items-center gap-4 px-4 py-4 rounded-2xl text-gray-500 hover:bg-gray-100 dark:text-gray-400 dark:hover:bg-white/5 transition-all font-medium group">
                        <i data-lucide="package" class="w-5 h-5"></i> Inventory Management
                    </a>
                    <a href="dashboard-customers.html" class="tab-link flex items-center gap-4 px-4 py-4 rounded-2xl text-gray-500 hover:bg-gray-100 dark:text-gray-400 dark:hover:bg-white/5 transition-all font-medium group">
                        <i data-lucide="users" class="w-5 h-5"></i> User Registry
                    </a>
                    <a href="dashboard-reports.html" class="tab-link flex items-center gap-4 px-4 py-4 rounded-2xl bg-primary text-white shadow-2xl shadow-primary/30 transition-all font-bold group">
                        <i data-lucide="bar-chart-3" class="w-5 h-5"></i> Tactical Reports
                    </a>
                    <p class="text-[10px] font-bold text-gray-400 uppercase tracking-[0.3em] mb-4 mt-10 px-4 font-heading">System Protocols</p>
                    <a href="dashboard-config.html" class="tab-link flex items-center gap-4 px-4 py-3.5 rounded-2xl text-gray-500 hover:bg-gray-100 dark:text-gray-400 dark:hover:bg-white/5 transition-all font-medium group">
                        <i data-lucide="settings" class="w-5 h-5"></i> System Configuration
                    </a>
                </nav>
            </div>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="flex-1 flex flex-col overflow-hidden bg-[#FBFBFB] dark:bg-dark">
            <header class="h-20 bg-white/80 dark:bg-[#1C1C1C]/80 backdrop-blur-md border-b border-gray-100 dark:border-gray-800 flex items-center justify-between px-8 z-20 shrink-0">
                <div class="flex items-center gap-8">
                    <button class="md:hidden text-gray-500" id="admin-menu-toggle"><i data-lucide="menu" class="w-6 h-6"></i></button>
                    <h2 class="text-xl font-bold font-heading rtl:text-right">Tactical Core Visualization</h2>
                </div>
                <div class="flex items-center gap-5">
                    <button id="dark-mode-toggle" class="w-10 h-10 flex items-center justify-center bg-gray-100 dark:bg-white/5 text-gray-500 rounded-2xl hover:bg-primary/10 hover:text-primary transition-all"><i data-lucide="sun" class="w-4 h-4 dark:hidden"></i><i data-lucide="moon" class="w-4 h-4 hidden dark:block"></i></button>
                    <div class="w-11 h-11 rounded-2xl bg-primary text-white flex items-center justify-center font-bold text-sm shadow-lg shadow-primary/20">A</div>
                </div>
            </header>

            <div class="flex-1 overflow-y-auto p-8 custom-scrollbar">
                <div id="admin-reports" class="space-y-12">
                     <div class="grid lg:grid-cols-2 gap-10">
                        <div class="bg-white dark:bg-[#1C1C1C] p-12 rounded-[3rem] border border-gray-100 dark:border-gray-800 shadow-sm transition-all"><h3 class="text-2xl font-heading font-bold mb-8 border-l-4 border-primary pl-4">Conversion Analytics</h3><div class="space-y-10"><div class="flex justify-between items-end mb-4"><p class="text-[10px] text-gray-400 font-extrabold uppercase tracking-widest">New Acquisition Conversion</p><p class="text-2xl font-bold font-heading">84%</p></div><div class="w-full h-2.5 bg-gray-100 dark:bg-white/5 rounded-full overflow-hidden"><div class="h-full bg-primary w-[84%] rounded-full shadow-lg shadow-primary/20 transition-all duration-1000"></div></div></div></div>
                        <div class="bg-white dark:bg-[#1C1C1C] p-12 rounded-[3rem] border border-gray-100 dark:border-gray-800 shadow-sm transition-all"><h3 class="text-2xl font-heading font-bold mb-8 border-l-4 border-blue-500 pl-4">Retention Lifecycle</h3><div class="space-y-10"><div class="flex justify-between items-end mb-4"><p class="text-[10px] text-gray-400 font-extrabold uppercase tracking-widest">Elite Member Loyalty Integrity</p><p class="text-2xl font-bold font-heading">96%</p></div><div class="w-full h-2.5 bg-gray-100 dark:bg-white/5 rounded-full overflow-hidden"><div class="h-full bg-blue-500 w-[96%] rounded-full shadow-lg shadow-blue-500/20 transition-all duration-1000"></div></div></div></div>
                     </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="../assets/js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const adminMenuToggle = document.getElementById('admin-menu-toggle');
            const sidebar = document.getElementById('sidebar');
            if (adminMenuToggle && sidebar) adminMenuToggle.addEventListener('click', () => sidebar.classList.toggle('-translate-x-full'));
        });
    </script>
</body>
</html>
