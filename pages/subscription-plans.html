<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configure Your Plan | Espresso Elite</title>
    <meta name="description" content="Choose your perfect coffee subscription plan. Flexible delivery of premium beans and capsules.">
    <meta property="og:title" content="Subscription Plans | Espresso Elite">
    <meta property="og:description" content="Choose your perfect coffee subscription plan. Flexible delivery of premium beans and capsules.">
    <meta property="og:type" content="website">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/dark-mode.css">
    <link rel="stylesheet" href="../assets/css/rtl.css">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { primary: '#6F4E37', secondary: '#C4A484', accent: '#D4A373', background: '#F5F3EF', dark: '#1C1C1C' },
                    fontFamily: { heading: ['Playfair Display', 'serif'], body: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Organization",
  "name": "Espresso Elite",
  "url": "https://www.espressoelite.com",
  "logo": "https://www.espressoelite.com/assets/images/ui/logo.webp",
  "contactPoint": {
    "@type": "ContactPoint",
    "telephone": "+1-555-019-8472",
    "contactType": "customer service"
  }
}
</script>
</head>
<body class="antialiased bg-background dark:bg-dark text-gray-900 dark:text-gray-100 transition-colors duration-300">

    <!-- Global Navigation (injected by components.js) -->
    <div id="global-nav"></div>

    <!-- Configure Plan Wizard -->
    <section class="pt-32 pb-24">
        <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="text-center mb-16" data-aos="fade-up">
                <h1 class="text-4xl md:text-5xl font-heading font-bold mb-4">Customize Your Plan</h1>
                <p class="text-gray-500">Explorer Plan • 2 Bags limit</p>
            </div>

            <!-- Steps Form -->
            <form class="space-y-12 bg-white dark:bg-[#2A2A2A] p-8 md:p-12 rounded-3xl shadow-lg border border-gray-100 dark:border-gray-800" data-aos="fade-up" data-aos-delay="100">
                
                <!-- Step 1: Coffee Preferences -->
                <div class="border-b border-gray-200 dark:border-gray-800 pb-12">
                    <div class="flex items-center gap-4 mb-8">
                        <div class="w-10 h-10 rounded-full bg-primary text-white flex items-center justify-center font-bold text-lg">1</div>
                        <h2 class="text-2xl font-bold">Coffee Profile</h2>
                    </div>
                    
                    <div class="grid sm:grid-cols-3 gap-6">
                        <label class="cursor-pointer">
                            <input type="radio" name="profile" class="peer sr-only" checked>
                            <div class="h-full p-6 border-2 border-gray-200 dark:border-gray-700 rounded-2xl peer-checked:border-primary peer-checked:bg-primary/5 hover:border-gray-300 transition-colors text-center selection-card">
                                <i data-lucide="sun" class="w-8 h-8 mx-auto mb-4 text-primary"></i>
                                <h3 class="font-bold mb-2">Light & Bright</h3>
                                <p class="text-xs text-gray-500">Floral, citrus, and sweet notes. Perfect for pour-overs.</p>
                            </div>
                        </label>
                        <label class="cursor-pointer">
                            <input type="radio" name="profile" class="peer sr-only">
                            <div class="h-full p-6 border-2 border-gray-200 dark:border-gray-700 rounded-2xl peer-checked:border-primary peer-checked:bg-primary/5 hover:border-gray-300 transition-colors text-center selection-card">
                                <i data-lucide="sun-dim" class="w-8 h-8 mx-auto mb-4 text-primary"></i>
                                <h3 class="font-bold mb-2">Balanced Medium</h3>
                                <p class="text-xs text-gray-500">Chocolate, caramel, and nuts. Great everyday cup.</p>
                            </div>
                        </label>
                        <label class="cursor-pointer">
                            <input type="radio" name="profile" class="peer sr-only">
                            <div class="h-full p-6 border-2 border-gray-200 dark:border-gray-700 rounded-2xl peer-checked:border-primary peer-checked:bg-primary/5 hover:border-gray-300 transition-colors text-center selection-card">
                                <i data-lucide="moon" class="w-8 h-8 mx-auto mb-4 text-primary"></i>
                                <h3 class="font-bold mb-2">Bold & Dark</h3>
                                <p class="text-xs text-gray-500">Intense, smoky, rich. Ideal for espresso lovers.</p>
                            </div>
                        </label>
                    </div>
                </div>

                <!-- Step 2: Format -->
                <div class="border-b border-gray-200 dark:border-gray-800 pb-12">
                    <div class="flex items-center gap-4 mb-8">
                        <div class="w-10 h-10 rounded-full bg-primary text-white flex items-center justify-center font-bold text-lg">2</div>
                        <h2 class="text-2xl font-bold">Coffee Format</h2>
                    </div>
                    
                    <div class="grid sm:grid-cols-2 lg:grid-cols-4 gap-4">
                        <label class="cursor-pointer">
                            <input type="radio" name="format" class="peer sr-only" checked>
                            <div class="py-4 border-2 border-gray-200 dark:border-gray-700 rounded-xl peer-checked:border-primary peer-checked:bg-primary/5 hover:border-gray-300 transition-colors text-center font-medium">Whole Bean</div>
                        </label>
                        <label class="cursor-pointer">
                            <input type="radio" name="format" class="peer sr-only">
                            <div class="py-4 border-2 border-gray-200 dark:border-gray-700 rounded-xl peer-checked:border-primary peer-checked:bg-primary/5 hover:border-gray-300 transition-colors text-center font-medium">Espresso Grind</div>
                        </label>
                        <label class="cursor-pointer">
                            <input type="radio" name="format" class="peer sr-only">
                            <div class="py-4 border-2 border-gray-200 dark:border-gray-700 rounded-xl peer-checked:border-primary peer-checked:bg-primary/5 hover:border-gray-300 transition-colors text-center font-medium">Filter Grind</div>
                        </label>
                        <label class="cursor-pointer">
                            <input type="radio" name="format" class="peer sr-only">
                            <div class="py-4 border-2 border-gray-200 dark:border-gray-700 rounded-xl peer-checked:border-primary peer-checked:bg-primary/5 hover:border-gray-300 transition-colors text-center font-medium">Capsules</div>
                        </label>
                    </div>
                </div>

                <!-- Step 3: Frequency -->
                <div class="pb-6">
                    <div class="flex items-center gap-4 mb-8">
                        <div class="w-10 h-10 rounded-full bg-primary text-white flex items-center justify-center font-bold text-lg">3</div>
                        <h2 class="text-2xl font-bold">Delivery Frequency</h2>
                    </div>
                    
                    <div class="grid sm:grid-cols-2 gap-6">
                        <label class="cursor-pointer">
                            <input type="radio" name="frequency" value="2weeks" class="peer sr-only">
                            <div class="p-6 border-2 border-gray-200 dark:border-gray-700 rounded-2xl peer-checked:border-primary peer-checked:bg-primary/5 hover:border-gray-300 transition-colors flex items-center justify-between">
                                <div>
                                    <h3 class="font-bold text-lg mb-1">Every 2 Weeks</h3>
                                    <p class="text-sm text-gray-500">Best for heavy drinkers</p>
                                </div>
                                <div class="w-6 h-6 rounded-full border border-gray-300 peer-checked:border-primary peer-checked:border-8"></div>
                            </div>
                        </label>
                        <label class="cursor-pointer">
                            <input type="radio" name="frequency" value="4weeks" class="peer sr-only" checked>
                            <div class="p-6 border-2 border-gray-200 dark:border-gray-700 rounded-2xl peer-checked:border-primary peer-checked:bg-primary/5 hover:border-gray-300 transition-colors flex items-center justify-between">
                                <div>
                                    <h3 class="font-bold text-lg mb-1">Every 4 Weeks</h3>
                                    <p class="text-sm text-gray-500">Standard delivery</p>
                                </div>
                                <div class="w-6 h-6 rounded-full border border-gray-300 peer-checked:border-primary peer-checked:border-8"></div>
                            </div>
                        </label>
                    </div>
                </div>

                <!-- Summary & CTA -->
                <div class="bg-[#F5F3EF] dark:bg-[#1C1C1C] rounded-2xl p-6 md:p-8 flex flex-col md:flex-row items-center justify-between gap-6">
                    <div>
                        <p class="text-sm text-gray-500 uppercase font-bold tracking-wider mb-2">Plan Summary</p>
                        <h3 class="text-xl font-bold mb-1">Explorer Plan (Light Roast, Whole Bean)</h3>
                        <p class="text-primary font-bold text-2xl" id="plan-price">$36.00/mo</p>
                    </div>
                    <a href="checkout.html" class="w-full md:w-auto px-8 py-4 bg-primary text-white rounded-xl font-bold hover:bg-gray-900 transition-colors shadow-lg hover:shadow-xl inline-flex justify-center items-center gap-2">
                        Add to Checkout <i data-lucide="arrow-right" class="w-4 h-4"></i>
                    </a>
                </div>

            </form>
        </div>
    </section>
        <!-- Global Footer -->
    <div id="global-footer"></div>


        <!-- Component Injection -->
    <script src="../assets/js/components.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        // Inject components AFTER lucide is loaded so icons render
        renderNavbar('../');
        renderFooter('../');
    </script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="../assets/js/main.js"></script>
    <script src="../assets/js/subscription.js"></script>
</body>
</html>
