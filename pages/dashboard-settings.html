<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espresso Elite | Member Preferences</title>
    <meta name="description" content="Customize your Espresso Elite member profile and experience.">
    <link rel="icon" type="image/png" href="../assets/images/ui/favicon.png">
    <meta name="robots" content="noindex, nofollow">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/dark-mode.css">
    <link rel="stylesheet" href="../assets/css/rtl.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { primary: '#6F4E37', secondary: '#C4A484', accent: '#D4A373', background: '#F5F3EF', dark: '#121212' },
                    fontFamily: { heading: ['Playfair Display', 'serif'], body: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
</head>
<body class="antialiased bg-gray-50 dark:bg-dark text-gray-900 dark:text-gray-100 transition-colors duration-300">

    <div class="flex h-screen overflow-hidden">
        
        <!-- SIDEBAR -->
        <aside class="w-72 bg-white/70 dark:bg-[#1C1C1C]/70 backdrop-blur-xl border-r border-gray-100 dark:border-gray-800 flex-shrink-0 flex flex-col transition-transform duration-300 md:translate-x-0 -translate-x-full fixed md:relative h-full z-50 md:z-auto" id="sidebar">
            <div class="h-20 flex items-center px-8 border-b border-gray-100 dark:border-gray-800">
                <a href="../index.html" class="flex items-center gap-3 group">
                    <div class="w-10 h-10 bg-primary/10 rounded-xl flex items-center justify-center group-hover:bg-primary transition-all">
                        <i data-lucide="coffee" class="text-primary group-hover:text-white w-5 h-5"></i>
                    </div>
                    <div>
                        <span class="font-heading font-bold text-lg block leading-none">Member</span>
                        <span class="text-[9px] font-bold text-gray-400 uppercase tracking-widest">Console</span>
                    </div>
                </a>
            </div>
            <div class="flex-1 overflow-y-auto px-6 py-8">
                <nav class="flex flex-col gap-2 sidebar-nav">
                    <p class="text-[10px] font-bold text-gray-400 uppercase tracking-[0.3em] mb-4 px-4 font-heading">Protocol Hub</p>
                    <a href="dashboard-user.html" class="tab-link flex items-center gap-4 px-4 py-4 rounded-2xl text-gray-500 hover:bg-gray-100 dark:text-gray-400 dark:hover:bg-white/5 transition-all font-medium group">
                        <i data-lucide="layout-grid" class="w-5 h-5"></i> Dashboard
                    </a>
                    <a href="dashboard-subscriptions.html" class="tab-link flex items-center gap-4 px-4 py-4 rounded-2xl text-gray-500 hover:bg-gray-100 dark:text-gray-400 dark:hover:bg-white/5 transition-all font-medium group">
                        <i data-lucide="box" class="w-5 h-5"></i> Brew Club
                    </a>
                    <a href="dashboard-orders.html" class="tab-link flex items-center gap-4 px-4 py-4 rounded-2xl text-gray-500 hover:bg-gray-100 dark:text-gray-400 dark:hover:bg-white/5 transition-all font-medium group">
                        <i data-lucide="shopping-cart" class="w-5 h-5"></i> Order History
                    </a>
                    <a href="dashboard-track.html" class="tab-link flex items-center gap-4 px-4 py-4 rounded-2xl text-gray-500 hover:bg-gray-100 dark:text-gray-400 dark:hover:bg-white/5 transition-all font-medium group">
                        <i data-lucide="map-pin" class="w-5 h-5"></i> Track Delivery
                    </a>
                    <a href="dashboard-wishlist.html" class="tab-link flex items-center gap-4 px-4 py-4 rounded-2xl text-gray-500 hover:bg-gray-100 dark:text-gray-400 dark:hover:bg-white/5 transition-all font-medium group">
                        <i data-lucide="heart" class="w-5 h-5"></i> Favorites
                    </a>
                    <p class="text-[10px] font-bold text-gray-400 uppercase tracking-[0.3em] mb-4 mt-10 px-4 font-heading">Identity</p>
                    <a href="dashboard-settings.html" class="tab-link flex items-center gap-4 px-4 py-3.5 rounded-2xl bg-primary text-white shadow-2xl shadow-primary/30 transition-all font-bold group">
                        <i data-lucide="user-cog" class="w-5 h-5"></i> Preferences
                    </a>
                    <a href="dashboard-security.html" class="tab-link flex items-center gap-4 px-4 py-3.5 rounded-2xl text-gray-500 hover:bg-gray-100 dark:text-gray-400 dark:hover:bg-white/5 transition-all font-medium group">
                        <i data-lucide="lock" class="w-5 h-5"></i> Security
                    </a>
                </nav>
            </div>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="flex-1 flex flex-col overflow-hidden bg-[#FBFBFB] dark:bg-dark">
            <header class="h-20 bg-white/80 dark:bg-[#1C1C1C]/80 backdrop-blur-md border-b border-gray-100 dark:border-gray-800 flex items-center justify-between px-8 z-20 shrink-0">
                <div class="flex items-center gap-8">
                    <button class="md:hidden text-gray-500" id="admin-menu-toggle"><i data-lucide="menu" class="w-6 h-6"></i></button>
                    <h2 class="text-xl font-bold font-heading">Preferences</h2>
                </div>
                <div class="flex items-center gap-5">
                    <button id="dark-mode-toggle" class="w-10 h-10 flex items-center justify-center bg-gray-100 dark:bg-white/5 text-gray-500 rounded-2xl hover:bg-primary/10 hover:text-primary transition-all">
                        <i data-lucide="sun" class="w-4 h-4 dark:hidden"></i>
                        <i data-lucide="moon" class="w-4 h-4 hidden dark:block"></i>
                    </button>
                    <div class="w-11 h-11 rounded-2xl bg-primary text-white flex items-center justify-center font-bold text-sm shadow-lg shadow-primary/20">JD</div>
                </div>
            </header>

            <div class="flex-1 overflow-y-auto p-8 custom-scrollbar">
                <div id="settings" class="max-w-4xl mx-auto space-y-12">
                    <div class="bg-white dark:bg-[#1C1C1C] rounded-[3.5rem] border border-gray-100 dark:border-gray-800 shadow-sm overflow-hidden">
                        <div class="p-16 border-b border-gray-50 dark:border-gray-800 bg-gray-50/50 dark:bg-white/5">
                            <h3 class="text-3xl font-heading font-bold mb-2 leading-tight">Identity Profile</h3>
                            <p class="text-sm text-gray-400 font-medium">Manage your personal credentials and contact channels.</p>
                        </div>
                        <div class="p-16 space-y-12">
                            <div class="flex flex-col md:flex-row gap-12 items-start">
                                <div class="w-32 h-32 rounded-[2rem] bg-primary/10 flex items-center justify-center text-primary text-4xl font-bold font-heading relative group shrink-0 shadow-inner">
                                    JD
                                    <button class="absolute -bottom-2 -right-2 w-10 h-10 bg-primary text-white rounded-xl shadow-2xl flex items-center justify-center border-4 border-white dark:border-[#1C1C1C] hover:scale-110 transition-transform"><i data-lucide="camera" class="w-4 h-4"></i></button>
                                </div>
                                <div class="flex-1 grid sm:grid-cols-2 gap-8 w-full">
                                    <div class="space-y-3"><label class="text-[10px] font-extrabold text-gray-400 uppercase tracking-[0.2em] ml-2">Display Alias</label><input type="text" value="John Doe" class="w-full px-6 py-4 bg-gray-50 dark:bg-white/5 border border-gray-100 dark:border-white/10 rounded-2xl text-sm font-bold focus:bg-white focus:ring-1 focus:ring-primary/20 outline-none transition-all"></div>
                                    <div class="space-y-3"><label class="text-[10px] font-extrabold text-gray-400 uppercase tracking-[0.2em] ml-2">Secure Email</label><input type="email" value="john.doe@espresso.com" class="w-full px-6 py-4 bg-gray-50 dark:bg-white/5 border border-gray-100 dark:border-white/10 rounded-2xl text-sm font-bold focus:bg-white focus:ring-1 focus:ring-primary/20 outline-none transition-all"></div>
                                    <div class="space-y-3"><label class="text-[10px] font-extrabold text-gray-400 uppercase tracking-[0.2em] ml-2">Primary Comms</label><input type="tel" value="+1 (555) 000-0000" class="w-full px-6 py-4 bg-gray-50 dark:bg-white/5 border border-gray-100 dark:border-white/10 rounded-2xl text-sm font-bold focus:bg-white focus:ring-1 focus:ring-primary/20 outline-none transition-all"></div>
                                    <div class="space-y-3"><label class="text-[10px] font-extrabold text-gray-400 uppercase tracking-[0.2em] ml-2">Time Region</label><select class="w-full px-6 py-4 bg-gray-50 dark:bg-white/5 border border-gray-100 dark:border-white/10 rounded-2xl text-sm font-bold outline-none cursor-pointer"><option>Eastern Standard (EST)</option><option>Pacific Standard (PST)</option></select></div>
                                </div>
                            </div>
                            <div class="pt-12 border-t border-gray-100 dark:border-white/5 flex flex-wrap justify-end gap-5">
                                <button class="px-10 py-4 bg-gray-100 dark:bg-white/5 text-[10px] font-extrabold uppercase tracking-widest rounded-2xl hover:bg-gray-200 transition-all">Reset Identity</button>
                                <button class="px-10 py-4 bg-primary text-white text-[10px] font-extrabold uppercase tracking-widest rounded-2xl shadow-2xl shadow-primary/20 hover:scale-105 transition-all">Update Encryption</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="../assets/js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const adminMenuToggle = document.getElementById('admin-menu-toggle');
            const sidebar = document.getElementById('sidebar');
            if (adminMenuToggle && sidebar) adminMenuToggle.addEventListener('click', () => sidebar.classList.toggle('-translate-x-full'));
        });
    </script>
</body>
</html>
